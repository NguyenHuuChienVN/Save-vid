version: "3.9"

services:
  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - BASE_URL=https://kindle-landslide-revenue.ngrok-free.dev/ # ← đổi thành domain của bạn
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_REQUESTS=5
      - RATE_LIMIT_WINDOW=60
      - MAX_DURATION_SEC=600
    volumes:
      - ./downloads:/app/downloads
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
